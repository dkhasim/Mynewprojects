name: Docker Image CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Build WAR
        run: mvn clean package

      - name: Show WAR files
        run: find . -name "*.war"

      - name: Build Docker Image
        run: docker build . -f Dockerfile -t my-image:${{ github.run_number }}
